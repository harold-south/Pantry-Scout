kind = "web"
previewPath = "/"
title = "Pantry Finder"
version = "1.0.0"
id = "artifacts/pantry-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19148

[services.development]
run = "pnpm --filter @workspace/pantry-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pantry-finder", "run", "build" ]
publicDir = "artifacts/pantry-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19148"
BASE_PATH = "/"
